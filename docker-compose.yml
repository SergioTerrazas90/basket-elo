services:
  postgres:
    image: postgres:16-alpine
    container_name: basket-elo-postgres
    environment:
      POSTGRES_USER: basket_elo
      POSTGRES_PASSWORD: basket_elo
      POSTGRES_DB: basket_elo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basket_elo -d basket_elo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/BasketElo.Api/Dockerfile
    container_name: basket-elo-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=basket_elo;Username=basket_elo;Password=basket_elo
      ApiSports__BaseUrl: https://v1.basketball.api-sports.io
      ApiSports__ApiKey: bef74529c17455cafe87dd1a6644deee
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:8080"

  worker:
    build:
      context: .
      dockerfile: src/BasketElo.Worker/Dockerfile
    container_name: basket-elo-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=basket_elo;Username=basket_elo;Password=basket_elo
      ApiSports__BaseUrl: https://v1.basketball.api-sports.io
      ApiSports__ApiKey: bef74529c17455cafe87dd1a6644deee
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:8080"

  web:
    build:
      context: .
      dockerfile: src/BasketElo.Web/Dockerfile
    container_name: basket-elo-web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - api
    ports:
      - "5000:8080"

volumes:
  postgres_data:
